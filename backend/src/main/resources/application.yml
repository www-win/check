server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/studybuddy?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  # 启动时自动执行建表脚本（表均为 CREATE TABLE IF NOT EXISTS，幂等安全）
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

studybuddy:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-please-32bytes-minimum-length}
    ttl-hours: 168
  wx:
    appid: ${WX_APPID:}
    secret: ${WX_SECRET:}
  checkin:
    base-points: 1
    makeup-cost: 50
    makeup-window-days: 7
    streak-window-days: 90
    milestones:
      7: 20
      30: 100
      100: 300
  oss:
    endpoint: ${OSS_ENDPOINT:}
    bucket: ${OSS_BUCKET:}
    access-key-id: ${OSS_AK:}
    access-key-secret: ${OSS_SK:}
    url-prefix: ${OSS_URL_PREFIX:}
    key-prefix: checkin
